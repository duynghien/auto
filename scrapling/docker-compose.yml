services:
  # Scrapling MCP Server (for AI integrations)
  scrapling-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: scrapling:latest
    container_name: scrapling-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8000}:8000"
    volumes:
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
    command: [ "mcp", "--http", "--host", "0.0.0.0", "--port", "8000" ]
    profiles:
      - mcp
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Scrapling CLI (one-shot scraping jobs)
  scrapling:
    build:
      context: .
      dockerfile: Dockerfile
    image: scrapling:latest
    container_name: scrapling-cli
    volumes:
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
    profiles:
      - cli
